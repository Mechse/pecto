name: Pecto
options:
  bundleIdPrefix: com.pecto
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  PectoKit:
    path: PectoKit

targets:
  Pecto:
    type: application
    platform: macOS
    sources: [Pecto]
    dependencies:
      - package: PectoKit
    info:
      path: Pecto/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Pecto
        NSSupportsAutomaticTermination: false
        LSApplicationCategoryType: public.app-category.productivity
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pecto.app
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "6.0"
        # Bumped per release. The git tag may carry a prerelease suffix
        # (v0.1.0-beta.1); CFBundleShortVersionString cannot, so it stays numeric.
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"

schemes:
  Pecto:
    build:
      targets:
        Pecto: all
